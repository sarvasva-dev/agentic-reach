services:
  backend:
    build: ./app/backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    volumes:
      - ./app/backend:/app

  frontend:
    build: ./app/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
